<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Вывод средств</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    padding-top: 64px;
}

.container {
    padding: 14px;
}

/* баланс */
.top {
    display: flex;
    justify-content: flex-end;
}

.balance {
    background: #2c2c2e;
    padding: 7px 13px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
}

.star-small {
    width: 16px;
}

/* заголовок */
.title {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    margin: 18px 0 12px;
}

/* ERROR */
.error {
    background: #d92c2c;
    padding: 14px 16px;
    border-radius: 22px;
    margin-bottom: 12px;
}

.error-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
}

.error-text {
    font-size: 14px;
    color: #ffb4b4;
    line-height: 1.35;
}

/* блок */
.block {
    margin-top: 12px;
    padding: 16px;
    border-radius: 22px;
    background: linear-gradient(180deg, #1c1c1e, #151517);
}

/* username красивый */
.input-box {
    background: linear-gradient(180deg, #1f1f1f, #171717);
    border-radius: 18px;
    padding: 16px;
    text-align: center;
    font-size: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.4);
}

#username {
    color: #e6e6e6;
    letter-spacing: 0.3px;
}

.subtext {
    text-align: center;
    color: #8e8e93;
    font-size: 13px;
    margin-top: 10px;
    line-height: 1.35;
}

/* сумма */
.amount-center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 95px;
}

.amount-inner {
    display: flex;
    align-items: center;
}

.amount-input {
    font-size: 64px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    text-align: right;
    width: 2ch;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
}

.star-big {
    width: 46px;
    height: 46px;
    margin-left: 6px;
}

.limits {
    text-align: center;
    color: #8e8e93;
    margin-top: 4px;
    font-size: 13px;
}

/* кнопка */
.button {
    position: fixed;
    bottom: 18px;
    left: 14px;
    right: 14px;
    background: #fff;
    color: #000;
    text-align: center;
    padding: 16px;
    border-radius: 26px;
    font-size: 17px;
    font-weight: 600;
    opacity: 0.4;
    pointer-events: none;
    transition: 0.2s;
}

.button.active {
    opacity: 1;
    pointer-events: auto;
}

/* TOAST */
.toast-container {
    position: fixed;
    top: calc(120px + env(safe-area-inset-top));
    left: 12px;
    right: 12px;
    z-index: 9999;
}

.toast {
    background: #c62828;
    color: #fff;
    padding: 18px 20px;
    border-radius: 28px;
    font-size: 17px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideDown 0.25s ease;
}

.toast-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
}

.toast.hide {
    opacity: 0;
    transform: translateY(-10px);
    transition: 0.25s;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-12px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <div class="balance">
            <img class="star-small" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
            <span id="balance">2.66</span>
        </div>
    </div>

    <div class="title">Вывод средств</div>

    <div id="errorBox" class="error" style="display:none;">
        <div class="error-title">Вывод невозможен!</div>
        <div class="error-text">
            Для вывода у вашего аккаунта обязательно должен быть юзернейм!
        </div>
    </div>

    <div class="block" id="userBlock">
        <div class="input-box" id="username">@username</div>
        <div class="subtext">
            Звезды придут к вам на аккаунт Telegram. Убедитесь, что юзернейм верный!
        </div>
    </div>

    <div class="block">
        <div class="amount-center">
            <div class="amount-inner">
                <input type="number" id="amountInput" class="amount-input" value="0">
                <img class="star-big" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
            </div>
        </div>

        <div class="limits">
            Минимальная сумма - 50, максимальная 10.000
        </div>
    </div>

</div>

<div class="button" id="btn">Введите сумму</div>

<div class="toast-container" id="toasts"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const errorBox = document.getElementById("errorBox");
const userBlock = document.getElementById("userBlock");
const input = document.getElementById("amountInput");
const btn = document.getElementById("btn");
const toastContainer = document.getElementById("toasts");

let hasUsername = true;
let currentToast = null;

if (!user || !user.username) {
    hasUsername = false;
    errorBox.style.display = "block";
    userBlock.style.display = "none";
} else {
    document.getElementById("username").innerText = "@" + user.username;
}

input.addEventListener("focus", () => {
    if (input.value === "0") input.value = "";
});

input.addEventListener("blur", () => {
    if (input.value === "") {
        input.value = "0";
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

input.addEventListener("input", () => {
    input.style.width = (input.value.length + 1) + "ch";

    if (input.value.length > 0 && hasUsername) {
        btn.classList.add("active");
        btn.innerText = "Вывести";
    } else {
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

function showToast(text) {
    if (currentToast) {
        currentToast.remove();
        currentToast = null;
    }

    const toast = document.createElement("div");
    toast.className = "toast";

    toast.innerHTML = `
        <div class="toast-icon">✕</div>
        <div>${text}</div>
    `;

    toastContainer.appendChild(toast);
    currentToast = toast;

    setTimeout(() => {
        toast.classList.add("hide");
        setTimeout(() => {
            toast.remove();
            currentToast = null;
        }, 250);
    }, 2500);
}

btn.onclick = () => {
    if (!hasUsername) return;

    let value = parseInt(input.value);

    if (!value || value < 50) {
        showToast("Минимальная сумма — 50 звезд");
        return;
    }

    if (value > 10000) {
        showToast("Максимальная сумма — 10 000");
        return;
    }

    tg.sendData(JSON.stringify({
        action: "withdraw",
        amount: value
    }));
};
</script>

</body>
</html>
