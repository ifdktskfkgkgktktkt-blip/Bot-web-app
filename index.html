<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Вывод средств</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    padding-top: calc(60px + env(safe-area-inset-top));
}

.container {
    padding: 16px;
}

/* баланс */
.top {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
}

.balance {
    background: #2c2c2e;
    padding: 8px 14px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
}

.star-small {
    width: 18px;
}

/* заголовок */.title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin: 22px 0 14px;
}

/* блок */
.block {
    margin-top: 14px;
    padding: 18px;
    border-radius: 20px;
    background: linear-gradient(180deg, #1c1c1e, #151517);
}

/* юзер */
.input-box {
    background: #111;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    font-size: 18px;
}

.subtext {
    text-align: center;
    color: #8e8e93;
    font-size: 13px;
    margin-top: 10px;
}

/* ошибка - красный блок */
.error {
    background: #d4322c;
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 14px;
}

.error-title {
    font-size: 19px;
    font-weight: 600;
    margin-bottom: 6px;
}

.error-text {
    font-size: 15px;
    color: #ffb3b3;
    line-height: 1.4;
}
/* сумма */
.amount-wrapper {
    background: linear-gradient(180deg, #1c1c1e, #151517);
    border-radius: 20px;
    padding: 40px 20px;
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 180px;
}

.amount-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
}

.amount-input {
    font-size: 64px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    text-align: center;
    width: 80px;
    padding: 0;
}

.star-big {
    width: 52px;
    height: 52px;
}

.limits {
    text-align: center;
    color: #8e8e93;
    font-size: 15px;
    margin-top: 8px;
}

/* кнопка */
.button {
    position: fixed;
    bottom: calc(18px + env(safe-area-inset-bottom));    left: 16px;
    right: 16px;
    background: #fff;
    color: #000;
    text-align: center;
    padding: 18px;
    border-radius: 26px;
    font-size: 17px;
    font-weight: 600;
    opacity: 0.4;
    pointer-events: none;
    transition: 0.2s;
}

.button.active {
    opacity: 1;
    pointer-events: auto;
}

/* TOAST - БОЛЬШОЙ под кнопками ТГ */
.toast-container {
    position: fixed;
    top: calc(8px + env(safe-area-inset-top));
    left: 12px;
    right: 12px;
    z-index: 9999;
}

.toast {
    background: #d4322c;
    color: #fff;
    padding: 20px 24px;
    border-radius: 24px;
    font-size: 19px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: slideDown 0.3s ease;
    box-shadow: 0 8px 24px rgba(212, 50, 44, 0.4);
}

.toast-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
}

.toast.hide {
    opacity: 0;
    transform: translateY(-10px);
    transition: 0.3s;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.hidden {
    display: none !important;
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <div class="balance">
            <img class="star-small" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
            <span id="balance">2.66</span>
        </div>
    </div>

    <div class="title">Вывод средств</div>

    <div id="errorBox" class="error hidden">
        <div class="error-title">Вывод невозможен!</div>
        <div class="error-text">
            Для вывода у вашего аккаунта обязательно должен быть юзернейм!
        </div>
    </div>

    <div class="block hidden" id="userBlock">
        <div class="input-box" id="username">@username</div>
        <div class="subtext">            Звезды придут к вам на аккаунт Telegram. Убедитесь, что юзернейм верный!
        </div>
    </div>

    <div class="amount-wrapper">
        <div class="amount-display">
            <input type="number" id="amountInput" class="amount-input" value="0" inputmode="numeric">
            <img class="star-big" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
        </div>
        <div class="limits">
            Минимальная сумма - 50, максимальная 10.000
        </div>
    </div>

</div>

<div class="button" id="btn">Введите сумму</div>

<div class="toast-container" id="toasts"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const errorBox = document.getElementById("errorBox");
const userBlock = document.getElementById("userBlock");
const input = document.getElementById("amountInput");
const btn = document.getElementById("btn");
const toastContainer = document.getElementById("toasts");

let hasUsername = true;
let currentToast = null;

if (!user || !user.username) {
    hasUsername = false;
    errorBox.classList.remove("hidden");
    userBlock.classList.add("hidden");
} else {
    document.getElementById("username").innerText = "@" + user.username;
    errorBox.classList.add("hidden");
    userBlock.classList.remove("hidden");
}

input.addEventListener("focus", () => {
    if (input.value === "0") input.value = "";
});

input.addEventListener("blur", () => {    if (input.value === "") {
        input.value = "0";
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

input.addEventListener("input", () => {
    let value = input.value.replace(/^0+/, '');
    if (value === '') value = '0';
    
    if (input.value !== value) {
        input.value = value;
    }

    if (input.value.length > 0 && hasUsername) {
        btn.classList.add("active");
        btn.innerText = "Вывести";
    } else {
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

function showToast(text) {
    if (currentToast) {
        currentToast.remove();
        currentToast = null;
    }

    const toast = document.createElement("div");
    toast.className = "toast";

    toast.innerHTML = `
        <div class="toast-icon">✕</div>
        <div>${text}</div>
    `;

    toastContainer.appendChild(toast);
    currentToast = toast;

    setTimeout(() => {
        toast.classList.add("hide");
        setTimeout(() => {
            toast.remove();
            currentToast = null;
        }, 300);
    }, 2500);
}
btn.onclick = () => {
    if (!hasUsername) return;

    let value = parseInt(input.value);

    if (!value || value < 50) {
        showToast("Минимальная сумма — 50 звезд");
        return;
    }

    if (value > 10000) {
        showToast("Максимальная сумма — 10 000");
        return;
    }

    tg.sendData(JSON.stringify({
        action: "withdraw",
        amount: value
    }));
};
</script>

</body>
</html>
