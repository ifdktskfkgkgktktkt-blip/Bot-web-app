<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мобильное меню</title>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* BADGE В ПРАВОМ ВЕРХНЕМ УГЛУ */
        .earnings-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            background-color: #3a3a3c;
            border-radius: 20px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .star-icon {
            width: 24px;
            height: 24px;
            font-size: 24px;
            line-height: 1;
        }

        .earnings-value {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #161618;
            width: 100%;
            position: fixed;
            bottom: 0;

            /* фикс для fullscreen */
            padding: 4px 0 calc(24px + env(safe-area-inset-bottom));

            border-top: 1px solid #252528;
            box-sizing: border-box;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            flex: 1;

            /* УБРАЛ ЛАГИ */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .nav-icon-container {
            width: 36px;
            height: 36px;
            margin-bottom: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-icon {
            width: 25px;
            height: 25px;
            object-fit: contain;
            filter: brightness(0.65);

            /* ЛЁГКАЯ АНИМАЦИЯ БЕЗ ЛАГОВ */
            transition: filter 0.15s linear;
        }

        .nav-item.active .nav-icon {
            filter: brightness(1.1);
        }

        .nav-label {
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            transition: color 0.15s linear;
        }

        .nav-item.active .nav-label {
            color: #ffffff;
            font-weight: 600;
        }

        #page-title {
            font-size: 28px;
            font-weight: 300;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- BADGE С ЗАРАБОТКОМ -->
    <div class="earnings-badge">
        <span class="star-icon">⭐</span>
        <span class="earnings-value">1,91</span>
    </div>

    <h1 id="page-title">Заработок</h1>

    <nav class="bottom-nav">
        <!-- Заработок -->
        <div class="nav-item active" data-title="Заработок">
            <div class="nav-icon-container">
                <img src="star.png" alt="Заработок" class="nav-icon">
            </div>
            <span class="nav-label">Заработок</span>
        </div>

        <!-- Игры -->
        <div class="nav-item" data-title="Игры">
            <div class="nav-icon-container">
                <img src="game.png" alt="Игры" class="nav-icon">
            </div>
            <span class="nav-label">Игры</span>
        </div>

        <!-- Лидеры -->
        <div class="nav-item" data-title="Лидеры">
            <div class="nav-icon-container">
                <img src="winer.png" alt="Лидеры" class="nav-icon">
            </div>
            <span class="nav-label">Лидеры</span>
        </div>

        <!-- Магазин -->
        <div class="nav-item" data-title="Магазин">
            <div class="nav-icon-container">
                <img src="market.png" alt="Магазин" class="nav-icon">
            </div>
            <span class="nav-label">Магазин</span>
        </div>

        <!-- Профиль -->
        <div class="nav-item" data-title="Профиль">
            <div class="nav-icon-container">
                <img src="profile.png" alt="Профиль" class="nav-icon">
            </div>
            <span class="nav-label">Профиль</span>
        </div>
    </nav>

    <script>
        /* FULLSCREEN TELEGRAM */
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (tg.requestFullscreen) {
            tg.requestFullscreen();
        }

        /* БЕЗ ЛАГОВ */
        const items = document.querySelectorAll('.nav-item');
        const title = document.getElementById('page-title');

        function setActive() {
            if (this.classList.contains('active')) return;

            items.forEach(item => item.classList.remove('active'));
            this.classList.add('active');
            title.innerText = this.dataset.title;
        }

        items.forEach(item => {
            item.addEventListener('touchstart', setActive, { passive: true });
            item.addEventListener('click', setActive);
        });
    </script>

</body>
</html>
