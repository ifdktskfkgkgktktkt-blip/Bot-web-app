<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator — звёзды растут, возможный приз ⭐</title>
    <style>
        body {
            margin: 0;
            background: #0b1422;
            color: white;
            font-family: Arial, sans-serif;
        }

        .balance-bar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .balance-value {
            font-size: 20px;
            font-weight: 600;
        }

        .add-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #2f7cff;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .timer-container {
            width: 100%;
            margin-top: 100px;
            text-align: center;
            position: relative;
        }

        .timer {
            font-size: 90px;
            height: 200px;
            line-height: 200px;
            font-weight: bold;
        }

        .plane {
            display: none;
            width: 100%;
            height: 200px;
            object-fit: contain;
        }

        .bottom-bar {
            display: flex;
            gap: 10px;
            padding: 12px;
            overflow-x: auto;
        }

        .bottom-item {
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 700;
            background: #1e2a47;
            color: #c8d4ea;
        }

        .bottom-item.active {
            background: white;
            color: black;
        }

        .bet-list {
            position: relative;
            width: 90%;
            margin: 20px auto;
            padding: 40px 20px 20px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            min-height: 140px;
        }

        .bet-title-left {
            position: absolute;
            top: 15px;
            left: 20px;
            font-weight: bold;
            display: none;
            font-size: 14px;
            color: #a0b5d9;
        }

        .bet-title-right {
            position: absolute;
            top: 15px;
            right: 20px;
            font-weight: bold;
            display: none;
            font-size: 14px;
            color: #a0b5d9;
        }

        .bet-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        /* Левая часть: звёзды и множитель в одной строке */
        .left-block {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 24px;
            font-weight: 700;
        }
        .star-icon {
            color: #ffd966;
            font-size: 28px;
            margin-right: 4px;
        }
        .stars-amount {
            color: #ffd966;
            font-size: 28px;
            font-weight: 800;
        }
        .multiplier-x {
            color: white;
            font-size: 24px;
            margin-left: 5px;
            opacity: 0.9;
        }
        .multiplier-value {
            color: #b3e0ff;
            font-size: 24px;
            font-weight: 600;
        }

        /* Правая часть: только иконка звезды (без цифр) */
        .right-star {
            color: #ffd966;
            font-size: 42px;
            line-height: 1;
            opacity: 0.9;
            text-shadow: 0 0 10px #ffb347;
        }

        .main-btn {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            background: #2f7cff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        #loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}

.loader-text {
    color: white;
    font-size: 28px;
    font-weight: bold;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-text">Загрузка...</div>
</div>

<div class="balance-bar">
    <span class="balance-value">⭐0</span>
    <button class="add-btn" id="addBalance">+</button>
</div>

<div class="timer-container">
    <div class="timer" id="timer"></div>
    <img id="planeImage" class="plane" src="PN4.webp" />
    <div class="bottom-bar" id="bottomBar"></div>
</div>

<div class="bet-list">
    <div class="bet-title-left" id="titleLeft">Ставка</div>
    <div class="bet-title-right" id="titleRight">Возможн. приз</div>
    <div id="bets" style="text-align:center;">Ставок еще нет</div>
</div>

<button class="main-btn" id="betBtn">Сделать ставку ⭐50</button>

<script>

window.addEventListener("load", () => {
    setTimeout(() => {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        
        setTimeout(() => {
            loader.style.display = "none";
        }, 500);
        
    }, 2000);
});
document.addEventListener("DOMContentLoaded", function() {
    let balance = localStorage.getItem("balance") 
        ? parseInt(localStorage.getItem("balance")) 
        : 0;

    const balanceEl = document.querySelector(".balance-value");
    const addBalanceBtn = document.getElementById("addBalance");
    const timerEl = document.getElementById("timer");
    const imageEl = document.getElementById("planeImage");
    const bottomBar = document.getElementById("bottomBar");
    const betsEl = document.getElementById("bets");
    const betBtn = document.getElementById("betBtn");
    const titleLeft = document.getElementById("titleLeft");
    const titleRight = document.getElementById("titleRight");

    // Данные ставки
    let initialBetStars = 0;      // сколько поставили (например, 50)
    let currentMultiplier = 1.00;  // текущий множитель

    balanceEl.innerText = "⭐" + balance;

    function saveBalance() {
        localStorage.setItem("balance", balance);
        balanceEl.innerText = "⭐" + balance;
    }

    addBalanceBtn.addEventListener("click", () => {
        balance += 100;
        saveBalance();
    });

    let time = 10;
    let waiting = true;
    let history = [];
    let growthInterval;

    function renderBottom(activeText = null) {
        bottomBar.innerHTML = "";
        if (activeText) {
            bottomBar.innerHTML += `<div class="bottom-item active">${activeText}</div>`;
        }
        history.forEach(h => {
            bottomBar.innerHTML += `<div class="bottom-item">${h}</div>`;
        });
    }

    function updateBets() {
        if (initialBetStars === 0) {
            betsEl.style.textAlign = "center";
            betsEl.innerHTML = "Ставок еще нет";
            titleLeft.style.display = "none";
            titleRight.style.display = "none";
            return;
        }

        betsEl.innerHTML = "";
        titleLeft.style.display = "block";
        titleRight.style.display = "block";

        // Текущее количество звёзд (начальная ставка * множитель, округлённое)
        let currentStars = Math.floor(initialBetStars * currentMultiplier);
        if (currentStars < initialBetStars) currentStars = initialBetStars; // защита от 0.99

        // Одна строка ставки
        betsEl.innerHTML = `
            <div class="bet-item">
                <div class="left-block">
                    <span class="star-icon">⭐</span>
                    <span class="stars-amount">${currentStars}</span>
                    <span class="multiplier-x">x</span>
                    <span class="multiplier-value">${currentMultiplier.toFixed(2)}</span>
                </div>
                <div class="right-star">⭐</div>
            </div>
        `;
    }

    betBtn.addEventListener("click", () => {
        if (!waiting) {
            alert("Сейчас идёт игра, дождитесь нового раунда");
            return;
        }

        let betAmount = 50;

        if (balance < betAmount) {
            alert("Недостаточно звёзд ⭐");
            return;
        }

        balance -= betAmount;
        saveBalance();

        initialBetStars = betAmount;
        currentMultiplier = 1.00;

        updateBets();
    });

    function startWaiting() {
        waiting = true;
        time = 10;
        // Сбрасываем ставку (по логике авиатора)
        initialBetStars = 0;
        updateBets();

        timerEl.innerText = time;
        imageEl.style.display = "none";
        timerEl.style.display = "block";

        renderBottom("Ожидание");

        const interval = setInterval(() => {
            time--;
            if (time <= 0) {
                clearInterval(interval);
                startRound();
                return;
            }
            timerEl.innerText = time;
        }, 1000);
    }

    function startRound() {
        waiting = false;
        currentMultiplier = 1.00;

        timerEl.style.display = "none";
        imageEl.style.display = "block";
        imageEl.src = "PN4.webp";

        if (initialBetStars > 0) {
            growthInterval = setInterval(() => {
                currentMultiplier += 0.03;
                updateBets();
                renderBottom("x" + currentMultiplier.toFixed(2));

                // Условие краша
                if (currentMultiplier >= 5 + Math.random() * 15) {
                    clearInterval(growthInterval);

                    let crashValue = currentMultiplier.toFixed(2);
                    history.unshift("x" + crashValue);
                    if (history.length > 10) history.pop();

                    imageEl.src = "crash.webp";

                    setTimeout(() => {
                        startWaiting();
                    }, 1500);
                }
            }, 50);
        } else {
            // Без ставки просто показываем полёт
            growthInterval = setInterval(() => {
                currentMultiplier += 0.03;
                renderBottom("x" + currentMultiplier.toFixed(2));

                if (currentMultiplier >= 5 + Math.random() * 15) {
                    clearInterval(growthInterval);
                    let crashValue = currentMultiplier.toFixed(2);
                    history.unshift("x" + crashValue);
                    if (history.length > 10) history.pop();
                    imageEl.src = "crash.webp";
                    setTimeout(() => {
                        startWaiting();
                    }, 1500);
                }
            }, 50);
        }
    }

    startWaiting();
});
</script>
</body>
</html>
