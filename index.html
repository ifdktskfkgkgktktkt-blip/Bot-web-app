<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мобильное меню</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
        }

        /* ===== ЗВЕЗДА КАК НА СКРИНЕ ===== */
        .balance {
            background: #3a3a3c;
            padding: 6px 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .balance svg {
            width: 16px;
            height: 16px;
        }

        .balance-text {
            font-size: 14px;
            font-weight: 600;
        }

        /* ===== ЦЕНТР ===== */
        #page-title {
            font-size: 28px;
            font-weight: 300;
            text-align: center;
            margin-top: 120px;
        }

        /* ===== НИЖНЕЕ МЕНЮ ===== */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #161618;
            width: 100%;
            position: fixed;
            bottom: 0;
            padding: 4px 0 calc(24px + env(safe-area-inset-bottom));
            border-top: 1px solid #252528;
            box-sizing: border-box;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .nav-icon-container {
            width: 36px;
            height: 36px;
            margin-bottom: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-icon {
            width: 25px;
            height: 25px;
            object-fit: contain;
            filter: brightness(0.65);
            transition: filter 0.15s linear;
        }

        .nav-item.active .nav-icon {
            filter: brightness(1.1);
        }

        .nav-label {
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            transition: color 0.15s linear;
        }

        .nav-item.active .nav-label {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-title">Заработок</div>

        <div class="balance">
            <svg viewBox="0 0 24 24" fill="#f5c542">
                <path d="M12 2L15 9L22 9L16.5 13.5L18.5 21L12 16.8L5.5 21L7.5 13.5L2 9L9 9Z"/>
            </svg>
            <span class="balance-text">1,91</span>
        </div>
    </div>

    <h1 id="page-title">Заработок</h1>

    <nav class="bottom-nav">

        <div class="nav-item active" data-title="Заработок">
            <div class="nav-icon-container">
                <img src="star.png" class="nav-icon">
            </div>
            <span class="nav-label">Заработок</span>
        </div>

        <div class="nav-item" data-title="Игры">
            <div class="nav-icon-container">
                <img src="game.png" class="nav-icon">
            </div>
            <span class="nav-label">Игры</span>
        </div>

        <div class="nav-item" data-title="Лидеры">
            <div class="nav-icon-container">
                <img src="winer.png" class="nav-icon">
            </div>
            <span class="nav-label">Лидеры</span>
        </div>

        <div class="nav-item" data-title="Магазин">
            <div class="nav-icon-container">
                <img src="market.png" class="nav-icon">
            </div>
            <span class="nav-label">Магазин</span>
        </div>

        <div class="nav-item" data-title="Профиль">
            <div class="nav-icon-container">
                <img src="profile.png" class="nav-icon">
            </div>
            <span class="nav-label">Профиль</span>
        </div>

    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (tg.requestFullscreen) {
            tg.requestFullscreen();
        }

        const items = document.querySelectorAll('.nav-item');
        const title = document.getElementById('page-title');

        function setActive() {
            if (this.classList.contains('active')) return;

            items.forEach(item => item.classList.remove('active'));
            this.classList.add('active');
            title.innerText = this.dataset.title;
        }

        items.forEach(item => {
            item.addEventListener('touchstart', setActive, { passive: true });
            item.addEventListener('click', setActive);
        });
    </script>

</body>
</html>
