<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Вывод средств</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ————— ПОЛНОСТЬЮ СОХРАНЯЕМ СТИЛИ, ОТСТУПЫ И РАЗМЕРЫ 1 В 1 ————— */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    padding-top: 60px;
    /* точно как в исходнике */
}

.container {
    padding: 16px;
}

/* баланс — идеальное выравнивание как на образце */
.top {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
}

.balance {
    background: #2c2c2e;
    padding: 8px 14px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
}

.star-small {
    width: 18px;
    height: 18px;
}

/* заголовок — полное соответствие */
.title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin: 22px 0 14px;
}

/* универсальный блок */
.block {
    margin-top: 14px;
    padding: 18px;
    border-radius: 20px;
    background: linear-gradient(180deg, #1c1c1e, #151517);
}

/* блок с юзернеймом */
.input-box {
    background: #111;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    font-size: 18px;
}

.subtext {
    text-align: center;
    color: #8e8e93;
    font-size: 13px;
    margin-top: 10px;
}

/* блок ошибки */
.error {
    background: #d4322c;
    padding: 12px 16px;
    border-radius: 18px;
    margin-top: 14px;
}

.error-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
}

.error-text {
    font-size: 13px;
    color: #f0a0a0;
    line-height: 1.4;
}

/* центральный блок с вводом суммы — идеальная геометрия */
.amount-center {
    position: relative;
    height: 90px;
}

.amount-inner {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 2px;
}

.amount-input {
    font-size: 66px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    text-align: right;
    width: 1ch;
    min-width: 2ch;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 0;
    margin: 0;
    line-height: 1;
}

/* убираем стрелки у number input */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
    appearance: textfield;
}

.star-big {
    width: 48px;
    height: 48px;
    margin-left: 4px;
}

.limits {
    text-align: center;
    color: #8e8e93;
    margin-top: 6px;
    font-size: 13px;
}

/* фиксированная кнопка внизу — как в оригинале */
.button {
    position: fixed;
    bottom: 18px;
    left: 14px;
    right: 14px;
    background: #fff;
    color: #000;
    text-align: center;
    padding: 17px;
    border-radius: 26px;
    font-size: 17px;
    font-weight: 600;
    opacity: 0.4;
    pointer-events: none;
    transition: 0.2s;
}

.button.active {
    opacity: 1;
    pointer-events: auto;
}

/* тосты (уведомления) */
.toast-container {
    position: fixed;
    top: calc(110px + env(safe-area-inset-top));
    left: 12px;
    right: 12px;
    z-index: 9999;
}

.toast {
    background: #c62828;
    color: #fff;
    padding: 16px 18px;
    border-radius: 22px;
    font-size: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideDown 0.25s ease;
}

.toast-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

.toast.hide {
    opacity: 0;
    transform: translateY(-10px);
    transition: 0.25s;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="top">
        <div class="balance">
            <img class="star-small" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg" alt="star">
            <span id="balance">2.66</span>
        </div>
    </div>

    <div class="title">Вывод средств</div>

    <div id="errorBox" class="error" style="display:none;">
        <div class="error-title">Вывод невозможен!</div>
        <div class="error-text">
            Для вывода у вашего аккаунта обязательно должен быть юзернейм!
        </div>
    </div>

    <div class="block" id="userBlock">
        <div class="input-box" id="username">@username</div>
        <div class="subtext">
            Звезды придут к вам на аккаунт Telegram. Убедитесь, что юзернейм верный!
        </div>
    </div>

    <div class="block">
        <div class="amount-center">
            <div class="amount-inner">
                <input type="number" id="amountInput" class="amount-input" value="0" inputmode="numeric">
                <img class="star-big" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg" alt="star">
            </div>
        </div>

        <div class="limits">
            Минимальная сумма - 50, максимальная 10.000
        </div>
    </div>

</div>

<div class="button" id="btn">Введите сумму</div>
<div class="toast-container" id="toasts"></div>

<script>
(function() {
    // Полное соответствие оригинальной логике и геометрии
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const user = tg.initDataUnsafe?.user ?? null;
    
    const errorBox = document.getElementById("errorBox");
    const userBlock = document.getElementById("userBlock");
    const usernameSpan = document.getElementById("username");
    const balanceSpan = document.getElementById("balance");
    const amountInput = document.getElementById("amountInput");
    const withdrawButton = document.getElementById("btn");
    const toastContainer = document.getElementById("toasts");
    
    let hasUsername = true;
    let currentToast = null;
    
    // ----- 1) Проверка юзернейма и отображение ошибки 1:1 как в исходнике -----
    if (!user || !user.username || user.username.trim() === "") {
        hasUsername = false;
        errorBox.style.display = "block";
        userBlock.style.display = "none";
    } else {
        hasUsername = true;
        errorBox.style.display = "none";
        userBlock.style.display = "block";
        // отображаем именно с @ перед именем
        usernameSpan.innerText = "@" + user.username;
    }
    
    // баланс остаётся как на скриншоте
    balanceSpan.innerText = "2.66";
    
    // ----- 2) Функции управления шириной инпута и кнопкой (оригинальный стиль)-----
    function adjustInputWidth() {
        let val = amountInput.value;
        if (val === "") val = "0";
        let len = val.length;
        if (len === 0) len = 1;
        let newWidth = (len + 1) + "ch";
        // не более 8ch для очень больших чисел (10000 максимум)
        if (len > 6) newWidth = "8ch";
        amountInput.style.width = newWidth;
    }
    
    function updateButtonState() {
        if (!hasUsername) {
            withdrawButton.classList.remove("active");
            withdrawButton.innerText = "Введите сумму";
            withdrawButton.style.opacity = "0.4";
            withdrawButton.style.pointerEvents = "none";
            return;
        }
        
        let rawValue = amountInput.value.trim();
        if (rawValue === "") rawValue = "0";
        let num = parseInt(rawValue, 10);
        if (isNaN(num)) num = 0;
        
        // если поле равно 0 или пустое — кнопка не активна
        if (num === 0 || rawValue === "0" || rawValue === "") {
            withdrawButton.classList.remove("active");
            withdrawButton.innerText = "Введите сумму";
        } else {
            withdrawButton.classList.add("active");
            withdrawButton.innerText = "Вывести";
        }
    }
    
    function sanitizeAndLimit() {
        let raw = amountInput.value;
        let cleaned = raw.replace(/[^0-9]/g, '');
        if (cleaned === "") {
            amountInput.value = "0";
        } else {
            let num = parseInt(cleaned, 10);
            if (isNaN(num)) num = 0;
            // макс 10.000 как в оригинале
            if (num > 10000) num = 10000;
            amountInput.value = num.toString();
        }
        adjustInputWidth();
        updateButtonState();
    }
    
    // обработчики инпута
    amountInput.addEventListener("focus", function() {
        if (amountInput.value === "0") {
            amountInput.value = "";
            adjustInputWidth();
            updateButtonState();
        }
    });
    
    amountInput.addEventListener("blur", function() {
        if (amountInput.value === "") {
            amountInput.value = "0";
            adjustInputWidth();
            updateButtonState();
        }
        // дополнительная проверка на 0
        if (amountInput.value === "0") {
            updateButtonState();
        }
    });
    
    amountInput.addEventListener("input", function() {
        let raw = amountInput.value;
        let cleaned = raw.replace(/[^0-9]/g, '');
        if (cleaned === "") {
            amountInput.value = "0";
        } else {
            let num = parseInt(cleaned, 10);
            if (isNaN(num)) num = 0;
            if (num > 10000) num = 10000;
            amountInput.value = num.toString();
        }
        adjustInputWidth();
        updateButtonState();
    });
    
    // ----- 3) тосты полностью как в исходной версии -----
    function showToast(message) {
        if (currentToast && currentToast.parentNode) {
            currentToast.remove();
            currentToast = null;
        }
        
        const toastDiv = document.createElement("div");
        toastDiv.className = "toast";
        // внутри иконка с крестиком и сообщение
        toastDiv.innerHTML = `
            <div class="toast-icon">✕</div>
            <div>${escapeHtml(message)}</div>
        `;
        toastContainer.appendChild(toastDiv);
        currentToast = toastDiv;
        
        setTimeout(() => {
            if (toastDiv && toastDiv.parentNode) {
                toastDiv.classList.add("hide");
                setTimeout(() => {
                    if (toastDiv && toastDiv.parentNode) {
                        toastDiv.remove();
                        if (currentToast === toastDiv) currentToast = null;
                    }
                }, 250);
            }
        }, 2500);
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ----- 4) Отправка данных в Telegram (полная копия логики) -----
    withdrawButton.onclick = function() {
        if (!hasUsername) return;
        
        let val = amountInput.value.trim();
        if (val === "") val = "0";
        let amount = parseInt(val, 10);
        
        if (isNaN(amount)) {
            showToast("Введите корректное число звезд");
            return;
        }
        
        if (amount < 50) {
            showToast("Минимальная сумма — 50 звезд");
            return;
        }
        
        if (amount > 10000) {
            showToast("Максимальная сумма — 10 000");
            return;
        }
        
        if (amount === 0) {
            showToast("Введите сумму больше нуля");
            return;
        }
        
        // отправляем данные точно в том же формате
        tg.sendData(JSON.stringify({
            action: "withdraw",
            amount: amount
        }));
    };
    
    // начальная инициализация ширины и состояния кнопки
    adjustInputWidth();
    updateButtonState();
    
    // дополнительная блокировка если нет username (чтобы стили были как надо)
    if (!hasUsername) {
        withdrawButton.classList.remove("active");
        withdrawButton.innerText = "Введите сумму";
        withdrawButton.style.opacity = "0.4";
        withdrawButton.style.pointerEvents = "none";
    }
    
    // при изменении значения через любые другие методы (например, автозаполнение)
    amountInput.addEventListener("change", function() {
        sanitizeAndLimit();
    });
    
    // полная поддержка удаления и вставки — ничего не сломано
    // и на всякий случай: обработка ручного ввода через стрелки мыши (уже учтено)
    
    // финальный штрих: для идеального совпадения отступов при динамическом безопасном区域内
    tg.ready();
    // устанавливаем цвет фона под стиль Telegram, не нарушая геометрию
    if (tg.setBackgroundColor) tg.setBackgroundColor("#000000");
    if (tg.setHeaderColor) tg.setHeaderColor("bg_color");
    
    // проверяем что если пользователь существует, но имя пустое? уже обработано!
    // дополнительно: если поле юзернейма отображается, но его нет — все корректно спрятано
    
    // важно: для полного соответствия размерам оставляем все отступы точно как в оригинале.
    // добавим небольшую защиту для динамического изменения контента (расчёт высоты кнопки)
    // но не меняя исходные стили
})();
</script>
</body>
</html>
