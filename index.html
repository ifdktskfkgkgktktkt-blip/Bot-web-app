<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Меню · разделы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="content-pages">
        
        <div class="current_balance">
            <img src="https://chimpbot.org/assets/stars-BaCoVmhq.svg" style="width: 20px;">
            <p id="stars_balance" style="margin-left: 6px;">0000,00</p>
        </div>

        <!-- Заработок -->
        <div id="page-earn" class="page-section active-page" data-page="Заработок">
            <h2 class="section-title">Заработок</h2>
            <!-- здесь можно добавить любой контент, заголовок легко стереть -->
        </div>

        <!-- Игры -->
        <div id="page-games" class="page-section" data-page="Игры">
            <h2 class="section-title">Игры</h2>
            <!-- пустой отдел «Игры» -->
        </div>

        <!-- Лидеры -->
        <div id="page-leaders" class="page-section" data-page="Лидеры">
            <h2 class="section-title">Лидеры</h2>
            <!-- пустой отдел «Лидеры» -->
        </div>

        <!-- Магазин -->
        <div id="page-shop" class="page-section" data-page="Магазин">
            <h2 class="section-title">Магазин</h2>
            <!-- пустой отдел «Магазин» -->
        </div>

        <!-- Профиль -->
        <div id="page-profile" class="page-section" data-page="Профиль">

            <!-- баланс с кнопкам -->
            <div class="container">
                <div class="flexer" style="margin-bottom: 4px;">
                    <img src="https://chimpbot.org/assets/stars-BaCoVmhq.svg" class="star_logo">
                    <p id="stars_balance" style="font-size: x-large;">0000,00</p>
                </div>
            
                <p class="hint_text">Баланс звёзд</p>
            
                <div class="flexer" style="margin-top: 12px;">
                    <button class="btn">Вывести</button>
                    <button class="btn white_btn">Пополнить</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">

        <div class="nav-item active" data-title="Заработок">
            <div class="nav-icon-container">
                <img src="star.png" alt="Заработок" class="nav-icon">
            </div>
            <span class="nav-label">Заработок</span>
        </div>

        <div class="nav-item" data-title="Игры">
            <div class="nav-icon-container">
                <img src="game.png" alt="Игры" class="nav-icon">
            </div>
            <span class="nav-label">Игры</span>
        </div>

        <div class="nav-item" data-title="Лидеры">
            <div class="nav-icon-container">
                <img src="winer.png" alt="Лидеры" class="nav-icon">
            </div>
            <span class="nav-label">Лидеры</span>
        </div>

        <div class="nav-item" data-title="Магазин">
            <div class="nav-icon-container">
                <img src="market.png" alt="Магазин" class="nav-icon">
            </div>
            <span class="nav-label">Магазин</span>
        </div>

        <div class="nav-item" data-title="Профиль">
            <div class="nav-icon-container">
                <img src="profile.png" alt="Профиль" class="nav-icon">
            </div>
            <span class="nav-label">Профиль</span>

        </div>

    </nav>

    <script>
(function() {

    const items = document.querySelectorAll('.nav-item');
    const balanceBlock = document.querySelector('.current_balance');

    const pages = {
        'Заработок': document.getElementById('page-earn'),
        'Игры': document.getElementById('page-games'),
        'Лидеры': document.getElementById('page-leaders'),
        'Магазин': document.getElementById('page-shop'),
        'Профиль': document.getElementById('page-profile')
    };

    function updateBalanceVisibility(sectionName) {
        const show = ['Заработок', 'Игры', 'Магазин'].includes(sectionName);
        if (balanceBlock) {
            balanceBlock.style.display = show ? 'flex' : 'none';
        }
    }

    function activate(event) {
        if (event.type === 'touchstart') {
            if (this._touchHandled) return;
            this._touchHandled = true;
            setTimeout(() => { this._touchHandled = false; }, 100);
        }

        if (this.classList.contains('active')) return;

        items.forEach(item => item.classList.remove('active'));
        this.classList.add('active');

        const sectionName = this.dataset.title;

        Object.values(pages).forEach(page => {
            if (page) page.classList.remove('active-page');
        });

        const activePage = pages[sectionName];
        if (activePage) {
            activePage.classList.add('active-page');
        }

        updateBalanceVisibility(sectionName);
    }

    items.forEach(item => {
        item._touchHandled = false;
        item.addEventListener('touchstart', activate, { passive: true });
        item.addEventListener('click', activate);
    });

    // init state
    const initialActiveItem = document.querySelector('.nav-item.active');
    if (initialActiveItem) {
        const initialSection = initialActiveItem.dataset.title;

        Object.values(pages).forEach(p => p.classList.remove('active-page'));
        const initialPage = pages[initialSection];
        if (initialPage) initialPage.classList.add('active-page');

        updateBalanceVisibility(initialSection);
    } else {
        updateBalanceVisibility('Заработок');
    }

})();
</script>
</body>
</html>
