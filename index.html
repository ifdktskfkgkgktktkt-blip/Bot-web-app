<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Меню · разделы</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
}

/* страницы */
.page-section {
    display: none;
}

.active-page {
    display: block;
}

/* баланс сверху */
.current_balance {
    position: fixed;
    top: 10px;
    right: 12px;
    background: #2c2c2e;
    padding: 6px 12px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    z-index: 10;
}

/* нижнее меню */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.nav-item {
    text-align: center;
    color: #888;
    font-size: 12px;
}

.nav-item.active {
    color: #fff;
}

.nav-icon {
    width: 24px;
}

/* профиль */
.container {
    padding: 16px;
}

.flexer {
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn {
    background: #fff;
    color: #000;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    margin: 5px;
}

.white_btn {
    background: #2c2c2e;
    color: #fff;
}

/* ===== ВЫВОД (твои стили) ===== */

.top {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
}

.balance {
    background: #2c2c2e;
    padding: 8px 14px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
}

.star-small {
    width: 18px;
}

.title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin: 22px 0 14px;
}

.block {
    margin-top: 14px;
    padding: 18px;
    border-radius: 20px;
    background: linear-gradient(180deg, #1c1c1e, #151517);
}

.input-box {
    background: #111;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    font-size: 18px;
}

.subtext {
    text-align: center;
    color: #8e8e93;
    font-size: 13px;
    margin-top: 10px;
}

.error {
    background: #d4322c;
    padding: 12px 16px;
    border-radius: 18px;
    margin-top: 14px;
}

.error-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
}

.error-text {
    font-size: 13px;
    color: #f0a0a0;
}

.amount-center {
    position: relative;
    height: 90px;
}

.amount-inner {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
}

.amount-input {
    font-size: 66px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    text-align: right;
    width: 1ch;
    min-width: 2ch;
}

.star-big {
    width: 48px;
    margin-left: 4px;
}

.limits {
    text-align: center;
    color: #8e8e93;
    margin-top: 6px;
    font-size: 13px;
}

.button {
    position: fixed;
    bottom: 18px;
    left: 14px;
    right: 14px;
    background: #fff;
    color: #000;
    text-align: center;
    padding: 17px;
    border-radius: 26px;
    font-size: 17px;
    opacity: 0.4;
    pointer-events: none;
}

.button.active {
    opacity: 1;
    pointer-events: auto;
}
</style>
</head>

<body>

<div class="content-pages">

    <div class="current_balance">
        <img src="https://chimpbot.org/assets/stars-BaCoVmhq.svg" style="width:20px;">
        <p style="margin-left:6px;">0000,00</p>
    </div>

    <!-- Заработок -->
    <div id="page-earn" class="page-section active-page">
        <h2>Заработок</h2>
    </div>

    <!-- Игры -->
    <div id="page-games" class="page-section">
        <h2>Игры</h2>
    </div>

    <!-- Лидеры -->
    <div id="page-leaders" class="page-section">
        <h2>Лидеры</h2>
    </div>

    <!-- Магазин -->
    <div id="page-shop" class="page-section">
        <h2>Магазин</h2>
    </div>

    <!-- Профиль -->
    <div id="page-profile" class="page-section">

        <div class="container">
            <div class="flexer">
                <img src="https://chimpbot.org/assets/stars-BaCoVmhq.svg" width="24">
                <p style="font-size:20px; margin-left:6px;">0000,00</p>
            </div>

            <p style="text-align:center;">Баланс звёзд</p>

            <div class="flexer">
                <button class="btn" id="openWithdraw">Вывести</button>
                <button class="btn white_btn">Пополнить</button>
            </div>
        </div>

    </div>

    <!-- ВЫВОД -->
    <div id="page-withdraw" class="page-section">

        <div class="container">

            <div class="top">
                <div class="balance">
                    <img class="star-small" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
                    <span id="balance">2.66</span>
                </div>
            </div>

            <div class="title">Вывод средств</div>

            <div id="errorBox" class="error" style="display:none;">
                <div class="error-title">Вывод невозможен!</div>
                <div class="error-text">Нужен username</div>
            </div>

            <div class="block" id="userBlock">
                <div class="input-box" id="username">@username</div>
                <div class="subtext">Проверь юзернейм</div>
            </div>

            <div class="block">
                <div class="amount-center">
                    <div class="amount-inner">
                        <input type="number" id="amountInput" class="amount-input" value="0">
                        <img class="star-big" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
                    </div>
                </div>

                <div class="limits">Минимум 50, максимум 10.000</div>
            </div>

        </div>

        <div class="button" id="btn">Введите сумму</div>

    </div>

</div>

<nav class="bottom-nav">
    <div class="nav-item active" data-title="Заработок">Заработок</div>
    <div class="nav-item" data-title="Игры">Игры</div>
    <div class="nav-item" data-title="Лидеры">Лидеры</div>
    <div class="nav-item" data-title="Магазин">Магазин</div>
    <div class="nav-item" data-title="Профиль">Профиль</div>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const items = document.querySelectorAll('.nav-item');
const balanceBlock = document.querySelector('.current_balance');

const pages = {
    'Заработок': document.getElementById('page-earn'),
    'Игры': document.getElementById('page-games'),
    'Лидеры': document.getElementById('page-leaders'),
    'Магазин': document.getElementById('page-shop'),
    'Профиль': document.getElementById('page-profile'),
    'Вывод': document.getElementById('page-withdraw')
};

function updateBalanceVisibility(section) {
    balanceBlock.style.display = ['Заработок','Игры','Магазин'].includes(section) ? 'flex' : 'none';
}

items.forEach(item => {
    item.onclick = () => {
        items.forEach(i => i.classList.remove('active'));
        item.classList.add('active');

        Object.values(pages).forEach(p => p.classList.remove('active-page'));

        pages[item.dataset.title].classList.add('active-page');
        updateBalanceVisibility(item.dataset.title);
    };
});

/* открыть вывод */
document.getElementById("openWithdraw").onclick = () => {
    Object.values(pages).forEach(p => p.classList.remove('active-page'));
    pages['Вывод'].classList.add('active-page');
    balanceBlock.style.display = 'none';
};

/* логика вывода */
const user = tg.initDataUnsafe?.user;
const errorBox = document.getElementById("errorBox");
const userBlock = document.getElementById("userBlock");
const input = document.getElementById("amountInput");
const btn = document.getElementById("btn");

let hasUsername = true;

if (!user || !user.username) {
    hasUsername = false;
    errorBox.style.display = "block";
    userBlock.style.display = "none";
} else {
    document.getElementById("username").innerText = "@" + user.username;
}

input.addEventListener("input", () => {
    input.style.width = (input.value.length + 1) + "ch";

    if (input.value.length > 0 && hasUsername) {
        btn.classList.add("active");
        btn.innerText = "Вывести";
    } else {
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

btn.onclick = () => {
    if (!hasUsername) return;

    let value = parseInt(input.value);
    if (!value) return;

    tg.sendData(JSON.stringify({
        action: "withdraw",
        amount: value
    }));
};
</script>

</body>
</html>
