<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мобильное меню</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #161618;
            width: 100%;
            position: fixed;
            bottom: 0;
            padding: 4px 0 24px 0;
            border-top: 1px solid #252528;
            box-sizing: border-box;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-icon-container {
            width: 36px;
            height: 36px;
            margin-bottom: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-icon {
            width: 25px;
            height: 25px;
            object-fit: contain;
            filter: brightness(0.65);           /* неактивные — приглушённые */
            transition: filter 0.25s ease, 
                        transform 0.25s ease;
        }

        /* Активное состояние — размер НЕ меняется */
        .nav-item.active .nav-icon {
            filter: brightness(1.1);
            /* transform: scale(1.15); — закомментировано, размер остаётся прежним */
        }

        .nav-label {
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            transition: color 0.2s ease;
        }

        .nav-item.active .nav-label {
            color: #ffffff;
            font-weight: 600;
        }

        .nav-item:active {
            transform: scale(0.94);
        }

        #page-title {
            font-size: 28px;
            font-weight: 300;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 id="page-title">Заработок</h1>

    <nav class="bottom-nav">
        <!-- Заработок -->
        <div class="nav-item active" onclick="setActive(this, 'Заработок')">
            <div class="nav-icon-container">
                <img src="star.png" alt="Заработок" class="nav-icon">
            </div>
            <span class="nav-label">Заработок</span>
        </div>

        <!-- Игры -->
        <div class="nav-item" onclick="setActive(this, 'Игры')">
            <div class="nav-icon-container">
                <img src="game.png" alt="Игры" class="nav-icon">
            </div>
            <span class="nav-label">Игры</span>
        </div>

        <!-- Лидеры -->
        <div class="nav-item" onclick="setActive(this, 'Лидеры')">
            <div class="nav-icon-container">
                <img src="winer.png" alt="Лидеры" class="nav-icon">
            </div>
            <span class="nav-label">Лидеры</span>
        </div>

        <!-- Магазин -->
        <div class="nav-item" onclick="setActive(this, 'Магазин')">
            <div class="nav-icon-container">
                <img src="market.png" alt="Магазин" class="nav-icon">
            </div>
            <span class="nav-label">Магазин</span>
        </div>

        <!-- Профиль -->
        <div class="nav-item" onclick="setActive(this, 'Профиль')">
            <div class="nav-icon-container">
                <img src="profile.png" alt="Профиль" class="nav-icon">
            </div>
            <span class="nav-label">Профиль</span>
        </div>
    </nav>

    <script>
        function setActive(element, title) {
            if (element.classList.contains('active')) return;

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('page-title').innerText = title;
        }
    </script>

</body>
</html>
