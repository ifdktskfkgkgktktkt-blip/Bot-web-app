<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App</title>

<style>
* {
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
}

/* ===== ВЕРХ ===== */
.top-bar {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 10px 0;
    display: none;
}

.balance-box {
    background: #3a3a3c;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* иконка звезды */
.balance-box img {
    width: 18px;
    height: 18px;
}

/* ===== ТЕКСТ ===== */
.main-text {
    text-align: center;
    margin-top: 5px;
    display: none;
}

.main-text h1 {
    color: #fff;
    font-size: 28px;
    margin: 0;
}

.main-text p {
    color: #8e8e93;
    font-size: 16px;
    margin-top: 10px;
}

/* ===== НИЖНЕЕ МЕНЮ ===== */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 70px;
    background: #1c1c1e;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #2c2c2e;
}

.nav-item {
    text-align: center;
    color: #8e8e93;
    font-size: 12px;
    cursor: pointer;
    transition: color 0.3s ease, transform 0.15s ease;
    user-select: none;
    outline: none;
    touch-action: manipulation;
}

.nav-item:active {
    transform: scale(0.92);
}

.nav-item svg {
    width: 26px;
    height: 26px;
    display: block;
    margin: 0 auto 4px;
    filter: brightness(0.7);
    transition: filter 0.3s ease, stroke 0.3s ease;
    fill: none;
    stroke: #8e8e93;
}

.nav-item.active {
    color: #a970ff;
}

.nav-item.active svg {
    filter: none;
    stroke: #a970ff;
}
</style>
</head>

<body>

<!-- ВЕРХ -->
<div class="top-bar" id="balanceBar">
    <div class="balance-box">
        <img src="https://chimpbot.org/assets/stars-BaVmhq.svg" alt="">
        1,91
    </div>
</div>

<!-- ТЕКСТ -->
<div class="main-text" id="homeContent">
    <h1>Получайте звезды</h1>
    <p>Выполняя простые задания</p>
</div>

<!-- МЕНЮ -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="setActive(this, 'home')">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 2l9 7.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Главная
    </div>

    <div class="nav-item" onclick="setActive(this, 'games')">
        <svg viewBox="0 0 24 24" stroke-width="2">
            <path d="M8 16 L5 19" />
            <path d="M8 12 C6 10, 4 10, 4 12 C4 14, 6 14, 8 12" />
            <path d="M12 8 C10 6, 10 4, 12 4 C14 4, 14 6, 12 8" />
            <path d="M16 12 C18 10, 20 10, 20 12 C20 14, 18 14, 16 12" />
            <path d="M12 16 C10 18, 10 20, 12 20 C14 20, 14 18, 12 16" />
        </svg>
        Игры
    </div>

    <div class="nav-item" onclick="setActive(this, 'leaders')">
        <svg viewBox="0 0 24 24" stroke-width="2">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
        </svg>
        Лидеры
    </div>

    <div class="nav-item" onclick="setActive(this, 'profile')">
        <svg viewBox="0 0 24 24" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
        </svg>
        Профиль
    </div>
</div>

<script>
const home = document.getElementById('homeContent');
const balance = document.getElementById('balanceBar');

home.style.display = 'block';
balance.style.display = 'flex';

function setActive(el, page) {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
    });

    el.classList.add('active');

    if (page === 'home') {
        home.style.display = 'block';
        balance.style.display = 'flex';
    } else {
        home.style.display = 'none';
        balance.style.display = 'none';
    }
}
</script>

</body>
</html>
