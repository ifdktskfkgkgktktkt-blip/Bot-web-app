<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Мобильное меню</title>

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #0c0c0e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    overflow: hidden;
}

/* Заголовок */
#page-title {
    font-size: 28px;
    font-weight: 300;
    text-align: center;
}

/* НИЖНЕЕ МЕНЮ */
.bottom-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    background-color: #161618;
    width: 100%;
    position: fixed;
    bottom: 0;

    /* главное для нормального fullscreen */
    padding: 6px 0 calc(10px + env(safe-area-inset-bottom));

    border-top: 1px solid #252528;
    box-sizing: border-box;
    z-index: 1000;
}

/* КНОПКИ */
.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

/* ИКОНКИ */
.nav-icon-container {
    width: 36px;
    height: 36px;
    margin-bottom: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.nav-icon {
    width: 25px;
    height: 25px;
    object-fit: contain;
    filter: brightness(0.65);
    transition: filter 0.15s linear;
}

.nav-item.active .nav-icon {
    filter: brightness(1.2);
}

/* ТЕКСТ */
.nav-label {
    font-size: 14px;
    font-weight: 500;
    color: #8e8e93;
}

.nav-item.active .nav-label {
    color: #ffffff;
    font-weight: 600;
}
</style>
</head>

<body>

<h1 id="page-title">Заработок</h1>

<nav class="bottom-nav">

<div class="nav-item active" data-title="Заработок">
    <div class="nav-icon-container">
        <img src="star.png" alt="Заработок" class="nav-icon">
    </div>
    <span class="nav-label">Заработок</span>
</div>

<div class="nav-item" data-title="Игры">
    <div class="nav-icon-container">
        <img src="game.png" alt="Игры" class="nav-icon">
    </div>
    <span class="nav-label">Игры</span>
</div>

<div class="nav-item" data-title="Лидеры">
    <div class="nav-icon-container">
        <img src="winer.png" alt="Лидеры" class="nav-icon">
    </div>
    <span class="nav-label">Лидеры</span>
</div>

<div class="nav-item" data-title="Магазин">
    <div class="nav-icon-container">
        <img src="market.png" alt="Магазин" class="nav-icon">
    </div>
    <span class="nav-label">Магазин</span>
</div>

<div class="nav-item" data-title="Профиль">
    <div class="nav-icon-container">
        <img src="profile.png" alt="Профиль" class="nav-icon">
    </div>
    <span class="nav-label">Профиль</span>
</div>

</nav>

<script>
/* TELEGRAM FULLSCREEN */
const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

if (tg.requestFullscreen) {
    tg.requestFullscreen();
}

/* КНОПКИ БЕЗ ЛАГОВ */
const items = document.querySelectorAll('.nav-item');
const title = document.getElementById('page-title');

function activate() {
    if (this.classList.contains('active')) return;

    items.forEach(item => item.classList.remove('active'));
    this.classList.add('active');

    title.textContent = this.dataset.title;
}

items.forEach(item => {
    item.addEventListener('touchstart', activate, { passive: true });
    item.addEventListener('click', activate);
});
</script>

</body>
</html>
