<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Вывод средств</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    padding-top: calc(70px + env(safe-area-inset-top));
}

/* контейнер */
.container {
    padding: 16px;
}

/* баланс */
.top {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
}

.balance {
    background: #2c2c2e;
    padding: 7px 12px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
}

.star-small {
    width: 16px;
}

/* заголовок */
.title {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    margin: 18px 0 12px;
}

/* блок */
.block {
    margin-top: 12px;
    padding: 16px;
    border-radius: 18px;
    background: #1c1c1e;
}

/* username */
.input-box {
    background: #111;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    font-size: 17px;
}

.subtext {
    text-align: center;
    color: #8e8e93;
    font-size: 12px;
    margin-top: 8px;
    line-height: 1.3;
}

/* ошибка */
.error {
    background: #d32f2f;
    padding: 14px 16px;
    border-radius: 20px;
    margin-bottom: 12px;
}

.error-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 3px;
}

.error-text {
    font-size: 13px;
    color: #ffc9c9;
}

/* сумма */
.amount-center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90px;
}

.amount-inner {
    display: flex;
    align-items: center;
    gap: 6px;
}

.amount-input {
    font-size: 64px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    text-align: right;
    width: 1ch;
    min-width: 2ch;
}

.star-big {
    width: 44px;
    height: 44px;
}

/* лимиты */
.limits {
    text-align: center;
    color: #8e8e93;
    margin-top: 6px;
    font-size: 12px;
}

/* кнопка */
.button {
    position: fixed;
    bottom: 18px;
    left: 14px;
    right: 14px;
    background: #fff;
    color: #000;
    text-align: center;
    padding: 16px;
    border-radius: 26px;
    font-size: 17px;
    font-weight: 600;
    opacity: 0.35;
    pointer-events: none;
    transition: 0.2s;
}

.button.active {
    opacity: 1;
    pointer-events: auto;
}

/* TOAST */
.toast-container {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 12px;
    right: 12px;
    z-index: 9999;
}

.toast {
    background: #d32f2f;
    color: #fff;
    padding: 14px 16px;
    border-radius: 24px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: slideDown 0.25s ease;
}

.toast-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
}

.toast.hide {
    opacity: 0;
    transform: translateY(-10px);
    transition: 0.25s;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <div class="balance">
            <img class="star-small" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
            <span id="balance">2.66</span>
        </div>
    </div>

    <div class="title">Вывод средств</div>

    <div id="errorBox" class="error" style="display:none;">
        <div class="error-title">Вывод невозможен!</div>
        <div class="error-text">
            Для вывода у вашего аккаунта обязательно должен быть юзернейм!
        </div>
    </div>

    <div class="block" id="userBlock">
        <div class="input-box" id="username">@username</div>
        <div class="subtext">
            Звезды придут на ваш аккаунт Telegram. Проверьте юзернейм.
        </div>
    </div>

    <div class="block">
        <div class="amount-center">
            <div class="amount-inner">
                <input type="number" id="amountInput" class="amount-input" value="0">
                <img class="star-big" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
            </div>
        </div>

        <div class="limits">
            Минимальная сумма — 50, максимальная — 10 000
        </div>
    </div>

</div>

<div class="button" id="btn">Введите сумму</div>

<div class="toast-container" id="toasts"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const errorBox = document.getElementById("errorBox");
const userBlock = document.getElementById("userBlock");
const input = document.getElementById("amountInput");
const btn = document.getElementById("btn");
const toastContainer = document.getElementById("toasts");

let hasUsername = true;
let currentToast = null;

if (!user || !user.username) {
    hasUsername = false;
    errorBox.style.display = "block";
    userBlock.style.display = "none";
} else {
    document.getElementById("username").innerText = "@" + user.username;
}

input.addEventListener("focus", () => {
    if (input.value === "0") input.value = "";
});

input.addEventListener("blur", () => {
    if (input.value === "") {
        input.value = "0";
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

input.addEventListener("input", () => {
    input.style.width = (input.value.length + 1) + "ch";

    if (input.value.length > 0 && hasUsername) {
        btn.classList.add("active");
        btn.innerText = "Вывести";
    } else {
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

function showToast(text) {
    if (currentToast) {
        currentToast.remove();
        currentToast = null;
    }

    const toast = document.createElement("div");
    toast.className = "toast";

    toast.innerHTML = `
        <div class="toast-icon">✕</div>
        <div>${text}</div>
    `;

    toastContainer.appendChild(toast);
    currentToast = toast;

    setTimeout(() => {
        toast.classList.add("hide");
        setTimeout(() => {
            toast.remove();
            currentToast = null;
        }, 250);
    }, 2500);
}

btn.onclick = () => {
    if (!hasUsername) return;

    let value = parseInt(input.value);

    if (!value || value < 50) {
        showToast("Минимальная сумма — 50 звезд");
        return;
    }

    if (value > 10000) {
        showToast("Максимальная сумма — 10 000");
        return;
    }

    tg.sendData(JSON.stringify({
        action: "withdraw",
        amount: value
    }));
};
</script>

</body>
</html>
