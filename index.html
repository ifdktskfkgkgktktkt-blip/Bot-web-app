<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мобильное меню</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0c0e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            min-height: 100vh;
        }

        /* ВЕРХ */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 16px 0;
        }

        .balance-badge {
            background: #3a3a3c;
            border-radius: 20px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .balance-badge img {
            width: 18px;
            height: 18px;
        }

        .balance-badge span {
            font-size: 14px;
            font-weight: 600;
        }

        /* ПРОФИЛЬ */
        .page {
            padding-top: 60px;
            padding-bottom: 120px;
            display: none;
            justify-content: center;
        }

        .balance-card {
            background: #1c1c1e;
            border-radius: 26px;
            padding: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .balance-top {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .star-icon {
            width: 32px;
            height: 32px;
        }

        .balance-value {
            font-size: 28px;
            font-weight: 600;
        }

        .balance-label {
            color: #8e8e93;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .balance-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            transition: 0.15s;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .withdraw {
            background: #3a3a3c;
            color: white;
        }

        .deposit {
            background: #ffffff;
            color: black;
        }

        /* МЕНЮ */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #161618;
            width: 100%;
            position: fixed;
            bottom: 0;
            padding: 4px 0 calc(24px + env(safe-area-inset-bottom));
            border-top: 1px solid #252528;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
            transition: 0.15s;
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-icon-container {
            width: 36px;
            height: 36px;
            margin-bottom: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-icon {
            width: 25px;
            height: 25px;
            filter: brightness(0.6);
            transition: 0.15s;
        }

        .nav-item.active .nav-icon {
            filter: brightness(1.2);
        }

        .nav-label {
            font-size: 14px;
            color: #8e8e93;
        }

        .nav-item.active .nav-label {
            color: #ffffff;
        }
    </style>
</head>

<body>

    <!-- ВЕРХ С ИКОНКОЙ -->
    <div class="top-bar">
        <div class="balance-badge">
            <img src="star.png">
            <span>1,91</span>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="page" id="profile-page">
        <div class="balance-card">
            <div class="balance-top">
                <img src="star.png" class="star-icon">
                <span class="balance-value">1,91</span>
            </div>

            <div class="balance-label">Баланс звезд</div>

            <div class="balance-actions">
                <button class="btn withdraw">Вывести</button>
                <button class="btn deposit">Пополнить</button>
            </div>
        </div>
    </div>

    <!-- МЕНЮ -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-page="earn">
            <div class="nav-icon-container">
                <img src="star.png" class="nav-icon">
            </div>
            <span class="nav-label">Заработок</span>
        </div>

        <div class="nav-item" data-page="games">
            <div class="nav-icon-container">
                <img src="game.png" class="nav-icon">
            </div>
            <span class="nav-label">Игры</span>
        </div>

        <div class="nav-item" data-page="leaders">
            <div class="nav-icon-container">
                <img src="winer.png" class="nav-icon">
            </div>
            <span class="nav-label">Лидеры</span>
        </div>

        <div class="nav-item" data-page="shop">
            <div class="nav-icon-container">
                <img src="market.png" class="nav-icon">
            </div>
            <span class="nav-label">Магазин</span>
        </div>

        <div class="nav-item" data-page="profile">
            <div class="nav-icon-container">
                <img src="profile.png" class="nav-icon">
            </div>
            <span class="nav-label">Профиль</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;

        tg.ready();
        tg.expand();

        if (tg.requestFullscreen) {
            tg.requestFullscreen();
        }

        function fixHeight() {
            document.body.style.minHeight = window.innerHeight + "px";
        }

        fixHeight();
        window.addEventListener("resize", fixHeight);

        const items = document.querySelectorAll('.nav-item');
        const profilePage = document.getElementById('profile-page');

        function setActive() {
            items.forEach(item => item.classList.remove('active'));
            this.classList.add('active');

            const page = this.dataset.page;

            profilePage.style.display = "none";

            if (page === "profile") {
                profilePage.style.display = "flex";
            }
        }

        items.forEach(item => {
            item.addEventListener('click', setActive);
        });
    </script>

</body>
</html>
