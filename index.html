<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мобильное меню</title>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0c0e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;

            /* УБРАЛ ПРЫЖОК */
            min-height: 100vh;
        }

        /* КОНТЕНТ */
        .page {
            padding-top: 20px;
            padding-bottom: 120px;
            display: flex;
            justify-content: center;
        }

        /* КАРТОЧКА ПРОФИЛЯ */
        .balance-card {
            background: #1c1c1e;
            border-radius: 26px;
            padding: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .balance-top {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .star-icon {
            width: 32px;
            height: 32px;
        }

        .balance-value {
            font-size: 28px;
            font-weight: 600;
        }

        .balance-label {
            color: #8e8e93;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .balance-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-size: 16px;
            font-weight: 600;
        }

        .withdraw {
            background: #3a3a3c;
            color: white;
        }

        .deposit {
            background: #ffffff;
            color: black;
        }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #161618;
            width: 100%;
            position: fixed;
            bottom: 0;

            padding: 4px 0 calc(24px + env(safe-area-inset-bottom));

            border-top: 1px solid #252528;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
        }

        .nav-icon-container {
            width: 36px;
            height: 36px;
            margin-bottom: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-icon {
            width: 25px;
            height: 25px;
            object-fit: contain;
            filter: brightness(0.65);
            transition: filter 0.15s linear;
        }

        .nav-item.active .nav-icon {
            filter: brightness(1.1);
        }

        .nav-label {
            font-size: 14px;
            color: #8e8e93;
        }

        .nav-item.active .nav-label {
            color: #ffffff;
        }
    </style>
</head>

<body>

    <!-- ПРОФИЛЬ -->
    <div class="page">
        <div class="balance-card">
            <div class="balance-top">
                <img src="star.png" class="star-icon">
                <span class="balance-value">1,91</span>
            </div>

            <div class="balance-label">Баланс звезд</div>

            <div class="balance-actions">
                <button class="btn withdraw">Вывести</button>
                <button class="btn deposit">Пополнить</button>
            </div>
        </div>
    </div>

    <!-- МЕНЮ -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-title="Заработок">
            <div class="nav-icon-container">
                <img src="star.png" class="nav-icon">
            </div>
            <span class="nav-label">Заработок</span>
        </div>

        <div class="nav-item" data-title="Игры">
            <div class="nav-icon-container">
                <img src="game.png" class="nav-icon">
            </div>
            <span class="nav-label">Игры</span>
        </div>

        <div class="nav-item" data-title="Лидеры">
            <div class="nav-icon-container">
                <img src="winer.png" class="nav-icon">
            </div>
            <span class="nav-label">Лидеры</span>
        </div>

        <div class="nav-item" data-title="Магазин">
            <div class="nav-icon-container">
                <img src="market.png" class="nav-icon">
            </div>
            <span class="nav-label">Магазин</span>
        </div>

        <div class="nav-item" data-title="Профиль">
            <div class="nav-icon-container">
                <img src="profile.png" class="nav-icon">
            </div>
            <span class="nav-label">Профиль</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;

        tg.ready();
        tg.expand();

        if (tg.requestFullscreen) {
            tg.requestFullscreen();
        }

        /* ФИКС ОТ ПРЫЖКА */
        function fixHeight() {
            document.body.style.minHeight = window.innerHeight + "px";
        }

        fixHeight();
        window.addEventListener("resize", fixHeight);

        /* КЛИКИ */
        const items = document.querySelectorAll('.nav-item');

        function setActive() {
            if (this.classList.contains('active')) return;

            items.forEach(item => item.classList.remove('active'));
            this.classList.add('active');
        }

        items.forEach(item => {
            item.addEventListener('click', setActive);
        });
    </script>

</body>
</html>
