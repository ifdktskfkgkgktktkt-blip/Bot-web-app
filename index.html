<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Telegram WebApp</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: #0c0c0e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

/* ВАЖНО для Telegram */
body {
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    color: white;
}

/* Контент */
#app {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-bottom: 80px; /* чтобы меню не перекрывало */
}

#page-title {
    font-size: 28px;
    font-weight: 400;
}

/* Нижнее меню */
.bottom-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    background-color: #161618;
    width: 100%;
    position: fixed;
    bottom: 0;
    left: 0;
    padding: 12px 0 25px 0;
    border-top: 1px solid #252528;
    z-index: 1000;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.nav-icon-container {
    width: 36px;
    height: 36px;
    margin-bottom: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.nav-icon {
    width: 25px;
    height: 25px;
    filter: brightness(0.65);
    transition: 0.2s;
}

.nav-label {
    font-size: 14px;
    color: #8e8e93;
    transition: 0.2s;
}

/* Активная кнопка */
.nav-item.active .nav-icon {
    filter: brightness(1.1);
}

.nav-item.active .nav-label {
    color: #fff;
    font-weight: 600;
}

/* Нажатие */
.nav-item:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div id="app">
    <h1 id="page-title">Заработок</h1>
</div>

<nav class="bottom-nav">

    <div class="nav-item active" onclick="setActive(this, 'Заработок')">
        <div class="nav-icon-container">
            <img src="star.png" class="nav-icon">
        </div>
        <div class="nav-label">Заработок</div>
    </div>

    <div class="nav-item" onclick="setActive(this, 'Игры')">
        <div class="nav-icon-container">
            <img src="game.png" class="nav-icon">
        </div>
        <div class="nav-label">Игры</div>
    </div>

    <div class="nav-item" onclick="setActive(this, 'Лидеры')">
        <div class="nav-icon-container">
            <img src="winer.png" class="nav-icon">
        </div>
        <div class="nav-label">Лидеры</div>
    </div>

    <div class="nav-item" onclick="setActive(this, 'Магазин')">
        <div class="nav-icon-container">
            <img src="market.png" class="nav-icon">
        </div>
        <div class="nav-label">Магазин</div>
    </div>

    <div class="nav-item" onclick="setActive(this, 'Профиль')">
        <div class="nav-icon-container">
            <img src="profile.png" class="nav-icon">
        </div>
        <div class="nav-label">Профиль</div>
    </div>

</nav>

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
let tg = window.Telegram.WebApp;

// Растягиваем на максимум
tg.expand();

// Говорим Telegram что всё готово
tg.ready();

// Цвета под фон (чтобы не было полос)
tg.setBackgroundColor("#0c0c0e");
tg.setHeaderColor("#0c0c0e");

// Отключаем свайпы вниз
if (tg.disableVerticalSwipes) {
    tg.disableVerticalSwipes();
}

// Логика кнопок
function setActive(el, title) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('page-title').innerText = title;
}
</script>

</body>
</html>
