<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Вывод средств</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    padding-top: 60px; /* <<< ВОТ ЭТО ОПУСКАЕТ ВСЁ */
}

.container {
    padding: 16px;
}

/* баланс */
.top {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
}

.balance {
    background: #2c2c2e;
    padding: 8px 14px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
}

.star-small {
    width: 18px;
}

/* заголовок */
.title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin: 22px 0 14px;
}

/* блок */
.block {
    margin-top: 14px;
    padding: 18px;
    border-radius: 20px;
    background: linear-gradient(180deg, #1c1c1e, #151517);
}

/* юзер */
.input-box {
    background: #111;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    font-size: 18px;
}

.subtext {
    text-align: center;
    color: #8e8e93;
    font-size: 13px;
    margin-top: 10px;
}

/* ошибка — тоньше */
.error {
    background: #d4322c;
    padding: 12px 16px;
    border-radius: 18px;
    margin-top: 14px;
}

.error-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
}

.error-text {
    font-size: 13px;
    color: #f0a0a0;
    line-height: 1.4;
}

/* сумма */
.amount-center {
    position: relative;
    height: 90px;
}

.amount-inner {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 2px;
}

.amount-input {
    font-size: 66px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    text-align: right;
    width: 1ch;
    min-width: 2ch;
}

/* убрать стрелки */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
}

/* звезда */
.star-big {
    width: 48px;
    height: 48px;
    margin-left: 4px;
}

.limits {
    text-align: center;
    color: #8e8e93;
    margin-top: 6px;
    font-size: 13px;
}

/* кнопка */
.button {
    position: fixed;
    bottom: 18px;
    left: 14px;
    right: 14px;
    background: #fff;
    color: #000;
    text-align: center;
    padding: 17px;
    border-radius: 26px;
    font-size: 17px;
    font-weight: 600;
    opacity: 0.4;
    pointer-events: none;
    transition: 0.2s;
}

.button.active {
    opacity: 1;
    pointer-events: auto;
}
</style>
</head>

<body>

<div class="container">

    <!-- баланс -->
    <div class="top">
        <div class="balance">
            <img class="star-small" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
            <span id="balance">2.66</span>
        </div>
    </div>

    <div class="title">Вывод средств</div>

    <!-- ошибка -->
    <div id="errorBox" class="error" style="display:none;">
        <div class="error-title">Вывод невозможен!</div>
        <div class="error-text">
            Для вывода у вашего аккаунта обязательно должен быть юзернейм!
        </div>
    </div>

    <!-- юзер -->
    <div class="block" id="userBlock">
        <div class="input-box" id="username">@username</div>
        <div class="subtext">
            Звезды придут к вам на аккаунт Telegram. Убедитесь, что юзернейм верный!
        </div>
    </div>

    <!-- сумма -->
    <div class="block">
        <div class="amount-center">
            <div class="amount-inner">
                <input type="number" id="amountInput" class="amount-input" value="0">
                <img class="star-big" src="https://chimpbot.org/assets/stars-BaCoVmhq.svg">
            </div>
        </div>

        <div class="limits">
            Минимальная сумма - 50, максимальная 10.000
        </div>
    </div>

</div>

<div class="button" id="btn">Введите сумму</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const errorBox = document.getElementById("errorBox");
const userBlock = document.getElementById("userBlock");
const input = document.getElementById("amountInput");
const btn = document.getElementById("btn");

let hasUsername = true;

// username
if (!user || !user.username) {
    hasUsername = false;
    errorBox.style.display = "block";
    userBlock.style.display = "none";
} else {
    document.getElementById("username").innerText = "@" + user.username;
}

// убрать 0
input.addEventListener("focus", () => {
    if (input.value === "0") input.value = "";
});

// вернуть 0
input.addEventListener("blur", () => {
    if (input.value === "") {
        input.value = "0";
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

// ввод
input.addEventListener("input", () => {
    input.style.width = (input.value.length + 1) + "ch";

    if (input.value.length > 0 && hasUsername) {
        btn.classList.add("active");
        btn.innerText = "Вывести";
    } else {
        btn.classList.remove("active");
        btn.innerText = "Введите сумму";
    }
});

// отправка
btn.onclick = () => {
    if (!hasUsername) return;

    let value = parseInt(input.value);
    if (!value) return;

    tg.sendData(JSON.stringify({
        action: "withdraw",
        amount: value
    }));
};
</script>

</body>
</html>
